name: upi_tracker
description: UPI Expense Tracker with auto-notification capture
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.66.2
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.1.0        # reads .env file at runtime
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - .env          # bundled with the app; gitignored (see .gitignore)
    - assets/icon.png

